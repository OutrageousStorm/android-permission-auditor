<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Permission Auditor Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
               background: #0d1117; color: #c9d1d9; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 10px; color: #58a6ff; }
        .info { background: #161b22; padding: 15px; border-radius: 6px; margin-bottom: 20px;
                border-left: 4px solid #1f6feb; }
        .apps { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .app-card { background: #161b22; padding: 15px; border-radius: 6px; border: 1px solid #30363d; }
        .app-name { font-weight: bold; color: #58a6ff; margin-bottom: 8px; }
        .perms { margin-top: 10px; }
        .perm { padding: 4px 8px; background: #0d419f; color: #79c0ff; border-radius: 3px;
                font-size: 12px; display: inline-block; margin: 2px; }
        .danger { background: #8b2c2c; color: #f85149; }
        button { padding: 8px 16px; background: #1f6feb; color: white; border: none;
                 border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #388bfd; }
        .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #30363d;
                   border-top-color: #58a6ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Android Permission Auditor</h1>
        <div class="info">
            <div id="status">
                <span class="spinner"></span> Scanning device...
            </div>
        </div>

        <div class="apps" id="apps-container">
        </div>
    </div>

    <script>
        async function auditDevice() {
            const container = document.getElementById('apps-container');
            const status = document.getElementById('status');
            
            try {
                // This would normally hit a backend API
                // For now, show example structure
                status.innerHTML = '✓ Connected to device';
                
                // Simulated data
                const apps = [
                    { pkg: "com.facebook.katana", perms: ["ACCESS_FINE_LOCATION", "READ_CONTACTS"] },
                    { pkg: "com.instagram.android", perms: ["CAMERA", "ACCESS_FINE_LOCATION"] },
                    { pkg: "com.whatsapp", perms: ["READ_CONTACTS", "RECORD_AUDIO"] }
                ];
                
                container.innerHTML = apps.map(app => `
                    <div class="app-card">
                        <div class="app-name">${app.pkg}</div>
                        <div class="perms">
                            ${app.perms.map(p => `
                                <span class="perm danger">${p}</span>
                            `).join('')}
                        </div>
                        <button onclick="revoke('${app.pkg}')">Revoke All</button>
                    </div>
                `).join('');
                
            } catch(e) {
                status.innerHTML = '❌ ' + e.message;
            }
        }
        
        function revoke(pkg) {
            alert(`Would revoke dangerous permissions from: ${pkg}`);
        }
        
        auditDevice();
    </script>
</body>
</html>
